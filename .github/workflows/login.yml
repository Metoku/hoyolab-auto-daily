name: Daily check in

on:
  schedule:
    - cron: "5 16 * * *" # scheduled at 00:05 (UTC+8) everyday"
  workflow_dispatch:

jobs:
  check-in:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Clone Repo
        uses: actions/checkout@v4

      - name: Restore redeemed codes cache
        uses: actions/cache@v4
        with:
          path: .redeemed-codes.json
          key: redeemed-codes
          restore-keys: redeemed-codes

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check In
        run: node index.js
        env:
          COOKIE: ${{ secrets.COOKIE }}
          GAMES: ${{ vars.GAMES }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_USER: ${{ secrets.DISCORD_USER }}

      - name: Save redeemed codes cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .redeemed-codes.json
          key: redeemed-codes
