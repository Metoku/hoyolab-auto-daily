name: Daily check in
on:
  schedule:
    - cron: "5 16 * * *" # scheduled at 00:05 (UTC+8) everyday
  workflow_dispatch:
jobs:
  check-in:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Clone Repo
        uses: actions/checkout@v4
      - name: Restore redeemed codes cache
        uses: actions/cache@v4
        with:
          path: .redeemed-codes.json
          key: redeemed-codes-${{ github.run_id }}
          restore-keys: redeemed-codes
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check In
        run: node index.js
        env:
          COOKIE: ${{ secrets.COOKIE }}
          GAMES: ${{ vars.GAMES }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_USER: ${{ secrets.DISCORD_USER }}
  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
